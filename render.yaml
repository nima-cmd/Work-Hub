# Render Blueprint (render.yaml) — https://render.com/docs/blueprint-spec
#
# One free web service — the same Express app + built React client you run
# locally with `npm run dev`/`npm run server`, just always-on instead of
# only-while-your-laptop's-open.
#
# There's deliberately no Render Cron Job here: Render's Cron Jobs have NO
# free tier (confirmed against Render's docs 2026-07-16 — cheapest is a paid
# "starter" plan), and Render's FREE web services spin down after 15 min of
# no inbound traffic (~1 min cold start on the next request). Both problems
# are solved by the SAME fix: a GitHub Actions scheduled workflow
# (.github/workflows/recurring-check.yml) hits this app's
# POST /api/internal/recurring-check every 10 minutes — comfortably under the
# 15-min spin-down window, so the app stays warm AND the 9am/2pm reminder /
# daily CSV-freshness check fire on schedule. Fully free (GitHub Actions'
# free-tier minutes are far more than a few curl calls a day need).
#
# Manual steps this file can't do for you (deliberately — see chat):
#   1. Create a free Render account, connect this repo's GitHub remote.
#   2. New → Blueprint → point at this repo. Render reads this file and
#      provisions the service below automatically.
#   3. In the service's Environment tab, paste in the REAL values for every
#      env var listed with `sync: false` — nothing secret lives in this file
#      or in git. You already have most of these in your local .env.local;
#      CRON_SECRET is new — pick any random string, then set that SAME value
#      as a GitHub Actions repo secret (Settings → Secrets and variables →
#      Actions) named CRON_SECRET so the two sides can authenticate to each
#      other. Also add the deployed URL there as a repo secret named
#      RENDER_URL (e.g. https://work-hub.onrender.com) once you have it.

services:
  - type: web
    name: work-hub
    runtime: node
    plan: free
    buildCommand: npm install && npm run client:build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: ORDERFUL_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
